<script>
const DATA = __REPORT_DATA__;
const DELETE = __DELETE_CONFIG__;
const FM = (DATA.system && /win/i.test(DATA.system.os||'')) ? '资源管理器' : '访达';
let CLEANED_PATHS = new Set();
let ACTIVE_PAGE = 'overview';
let ACTIVE_DECISION = 'green';
const esc = s => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const cleanSize = s => String(s==null?'':s).replace(/[（(]\s*估算[^）)]*[）)]/g,'').trim();
const b64 = o => btoa(unescape(encodeURIComponent(JSON.stringify(o))));
const unb64 = s => JSON.parse(decodeURIComponent(escape(atob(s))));
const arr = v => Array.isArray(v) ? v : [];
function parseGB(str){if(!str)return 0;const m=String(str).match(/([\d.]+)\s*(TB|GB|MB|KB|B)?/i);if(!m)return 0;let v=parseFloat(m[1]);const u=(m[2]||'GB').toUpperCase();if(u==='TB')v*=1024;else if(u==='MB')v/=1024;else if(u==='KB')v/=1024/1024;else if(u==='B')v/=1024/1024/1024;return v}
	const fmtGB = v => v>0 ? (v>=1024?`${(v/1024).toFixed(1)} TB`:`${v.toFixed(1)} GB`) : '—';
	const pct = (v,max) => max>0 ? Math.max(0,Math.min(100,v/max*100)) : 0;
	const brief = (s,n=76) => {s=String(s||'').replace(/\s+/g,' ').trim();return s.length>n?s.slice(0,n-1)+'…':s};
const ICON = {finder:'<svg viewBox="0 0 24 24"><path d="M4 5h16v14H4z"/><path d="M9 5v14"/></svg>',trash:'<svg viewBox="0 0 24 24"><path d="M4 7h16"/><path d="M9 7V4h6v3"/><path d="M6 7l1 13h10l1-13"/></svg>',shield:'<svg viewBox="0 0 24 24"><path d="M12 3l7 3v5c0 5-3 8-7 10-4-2-7-5-7-10V6z"/><path d="M9 12l2 2 4-5"/></svg>',arrow:'<svg viewBox="0 0 24 24"><path d="M5 12h14"/><path d="M13 6l6 6-6 6"/></svg>',drive:'<svg viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="14" rx="3"/><path d="M7 15h.01"/><path d="M11 15h6"/></svg>',folder:'<svg viewBox="0 0 24 24"><path d="M4 7h6l2 2h8v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2z"/></svg>',file:'<svg viewBox="0 0 24 24"><path d="M7 3h7l4 4v14H7z"/><path d="M14 3v5h5"/><path d="M9 13h6"/><path d="M9 17h4"/></svg>'};
function dataIcon(i,tone){const icons=[ICON.drive,ICON.folder,ICON.file];const tones=['blue','violet','cyan'];return `<div class="data-icon ${tone||tones[i%3]}">${icons[i%3]}</div>`}
function tierStats(){const ts=DATA.summary&&DATA.summary.tier_stats;return{green:ts?parseGB(ts.green):0,yellow:ts?parseGB(ts.yellow):0,red:ts?parseGB(ts.red):0}}
function pageShell(id,title,desc,inner){return `<section class="page" id="page-${id}" data-page="${id}"><div class="page-body">${inner}</div></section>`}
	function initShell(s){const fullTitle=DATA.report?.title||`${s.computer_name||s.user||'这台电脑'} 的存储分析报告`;const rawTitle=s.computer_name||fullTitle.replace(/\s*的存储分析报告$/,'');const title=rawTitle.replace(/([^\s])的([^\s])/g,'$1 的 $2');document.getElementById('title').textContent=title;document.title=fullTitle;document.getElementById('meta').innerHTML=`<b>${esc(DATA.generated_at||'--')}</b> · ${esc(DATA.scan_seconds||'?')}s · ${DELETE?'安全模式':'只读'}`}
	function updateTopActions(page){}
	function renderOverview(s,sm){initShell(s||{});const total=parseGB(s.disk_total)||1,used=parseGB(s.disk_used),free=parseGB(s.disk_free)||Math.max(0,total-used);const t=tierStats();const other=Math.max(0,used-t.green-t.yellow-t.red);const disks=arr(s.disks);const topRows=arr(DATA.top5).slice(0,4).map(r=>`<div class="overview-row"><div class="item-main"><div class="item-name">${esc(r.name)}</div><div class="item-path">${esc(r.path)}</div></div><div class="item-size">${esc(cleanSize(r.size))}</div></div>`).join('');const diskRows=disks.slice(0,5).map((d,i)=>{const u=parseGB(d.used),tt=parseGB(d.total)||1;return `<div class="bar-row">${dataIcon(i,d.external?'cyan':null)}<div class="bar-name" title="${esc(d.mount||d.name||'磁盘')}">${esc(d.name||d.mount||'磁盘')}</div><div class="bar-size">${esc(d.used||'—')}</div><div class="bar-track"><i class="${d.external?'cyan':'blue'}" style="width:${pct(u,tt).toFixed(1)}%"></i></div></div>`}).join('');const storage=[['green','可清理',t.green],['yellow','需确认',t.yellow],['red','谨慎',t.red],['blue','其他',other]].map(x=>`<div class="compact-item"><span class="swatch ${x[0]}"></span><span>${x[1]}</span><b>${fmtGB(x[2])}</b></div>`).join('');const segs=[['green',t.green],['yellow',t.yellow],['red',t.red],['blue',other]].filter(x=>x[1]>0).map(x=>`<i class="${x[0]}" style="width:${pct(x[1],total).toFixed(2)}%"></i>`).join('');return pageShell('overview','概览','',`<div class="grid overview-grid"><div class="panel overview-hero"><div class="hero-top"><div><div class="eyebrow">可释放空间</div><div class="hero-value">${fmtGB(t.green)}</div><div class="hero-sub">${esc(brief(sm?.overview||'先处理低风险项目。',36))}</div></div></div><div class="quick-stats"><div class="quick-stat"><span>已用</span><b>${esc(s.disk_used||fmtGB(used))}</b></div><div class="quick-stat"><span>可用</span><b>${esc(s.disk_free||fmtGB(free))}</b></div><div class="quick-stat"><span>磁盘</span><b>${disks.length||1}</b></div></div></div><div class="panel storage-card"><div class="panel-title"><h3>存储概览</h3><span>${pct(used,total).toFixed(0)}%</span></div><div class="storage-main"><strong>${esc(s.disk_used||fmtGB(used))}</strong><span>/ ${esc(s.disk_total||fmtGB(total))}</span></div><div class="storage-bar">${segs}</div><div class="compact-legend">${storage}</div></div><div class="panel"><div class="panel-title"><h3>重点项</h3><span>Top ${Math.min(arr(DATA.top5).length,4)}</span></div><div class="overview-list">${topRows||'<div class="empty">暂无数据</div>'}</div></div><div class="panel"><div class="panel-title"><h3>磁盘</h3><span>${disks.length||1}</span></div><div class="legend-list">${diskRows||'<div class="empty">暂无磁盘</div>'}</div></div></div>`)}
	function renderAnalysis(){return pageShell('analysis','存储分析','排行与决策',`<div class="analysis-layout">${renderRank(DATA.top5)}<div class="panel decision-panel"><div class="panel-title"><h3>清理决策</h3><span>绿灯可清理</span></div>${renderDecisions()}</div></div><div style="height:14px"></div>${renderSummary(DATA.summary)}${renderDenied()?'<div style="height:12px"></div>'+renderDenied():''}`)}
function renderRank(rows){rows=arr(rows);if(!rows.length)return '<div class="panel"><div class="empty">暂无占用排行数据</div></div>';const max=Math.max(...rows.map(r=>parseGB(r.size)))||1;const body=rows.map(r=>{const gb=parseGB(r.size);return `<div class="rank-row"><div class="rank-no">${String(r.rank||'').padStart(2,'0')}</div><div class="item-main"><div class="item-name">${esc(r.name)}</div><div class="item-path">${esc(r.path)}</div></div><div><div class="rank-meter"><i class="${esc(r.tier||'blue')}" style="width:${pct(gb,max).toFixed(1)}%"></i></div><div class="item-kind">${esc(r.type||'')}</div></div><div class="item-size">${esc(cleanSize(r.size))}</div></div>`}).join('');return `<div class="panel"><div class="panel-title"><h3>占用排行</h3><span>Top ${rows.length}</span></div><div class="rank-head"><span>#</span><span>名称</span><span>占比</span><span>大小</span></div><div class="rank-list">${body}</div></div>`}
function renderDecisions(){const tabs=[['green','可清理',DATA.green],['yellow','需确认',DATA.yellow],['red','谨慎处理',DATA.red]].map(([id,label,items])=>`<button class="decision-tab ${id===ACTIVE_DECISION?'active':''}" type="button" data-decision="${id}" onclick="switchDecision('${id}')"><span class="swatch ${id}"></span>${label}<span class="count">${arr(items).length}</span></button>`).join('');return `<div class="decision-tabs">${tabs}</div>${decisionPage('green',DATA.green,renderGreenRow)}${decisionPage('yellow',DATA.yellow,renderYellowRow)}${decisionPage('red',DATA.red,renderRedRow)}`}
function decisionPage(tier,items,renderer){items=arr(items);const body=items.length?items.map(it=>renderer(it)).join(''):`<div class="empty">暂无${tier==='green'?'可清理':tier==='yellow'?'需确认':'谨慎处理'}项</div>`;return `<div class="decision-page ${tier===ACTIVE_DECISION?'active':''}" data-decision-page="${tier}"><div class="decision-list">${body}</div></div>`}
function decisionBase(tier,it,size,meta,actions){return `<div class="decision-row ${tier}"><div class="item-main"><div class="item-name">${esc(it.name)}</div><div class="item-path">${esc(it.path)}</div><div class="decision-meta">${meta}</div></div><div class="decision-size">${esc(cleanSize(size||''))}</div><div class="btn-row">${actions}</div></div>`}
function renderGreenRow(it){const procs=arr(it.kill_processes).length?arr(it.kill_processes).map(p=>`<span class="tag">${esc(p)}</span>`).join(''):'<span class="note">无需关闭进程</span>';return decisionBase('green',it,it.size_estimate,procs,trashBlock(it))}
function renderYellowRow(it){const meta=`<span>${esc(it.content_profile||'待确认内容')}</span>${it.risk?`<span class="risk">${esc(it.risk)}</span>`:''}`;return decisionBase('yellow',it,it.size,meta,yellowBlock(it)||'<span class="note">静态预览</span>')}
function renderRedRow(it){return decisionBase('red',it,it.size,`<span>${esc(it.why_keep||'建议谨慎处理')}</span>`,redBlock(it)||'<span class="note">正规卸载</span>')}
	function renderBigFiles(items){items=arr(items);const rows=items.map((it,i)=>`<div class="file-row">${dataIcon(i)}<div class="item-main"><div class="item-name">${esc(it.name)}</div><div class="item-path">${esc(it.path)}</div></div><span class="kind-pill">${esc(it.kind||'文件')}</span><div class="item-size">${esc(cleanSize(it.size))}</div>${DELETE?`<button class="btn ghost" onclick="openPath(this)" data-open="${b64([it.path])}">${ICON.finder}访问</button>`:`<span class="note">只读</span>`}</div>`).join('');return pageShell('big-files','大文件','只读定位',`<div class="panel"><div class="panel-title"><h3>最大单文件</h3><span>${items.length}</span></div><div class="file-list">${rows||'<div class="empty">暂无数据</div>'}</div></div>`)}
	function renderDuplicates(items){items=arr(items);const rows=items.map((it,i)=>{const paths=arr(it.paths);const first=paths[0]||'';const pathsHtml=paths.map(p=>`<div class="dup-path">${DELETE?`<button class="btn ghost" style="padding:4px 8px" onclick="openPath(this)" data-open="${b64([p])}" title="访问">${ICON.finder}</button>`:''}<span>${esc(p)}</span></div>`).join('');return `<div class="dup-group" id="dup${i}"><div class="dup-head" onclick="document.getElementById('dup${i}').classList.toggle('open')"><svg class="dup-toggle" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg><div class="item-main"><div class="item-name">${esc(it.name)} <span class="note">×${esc(it.count||paths.length)}</span></div><div class="dup-wasted">可省 ${esc(cleanSize(it.wasted))}</div></div><span class="kind-pill">${esc(it.kind||'文件')}</span><span class="item-size">${esc(cleanSize(it.size))}</span>${DELETE&&first?`<button class="btn ghost" onclick="event.stopPropagation();openPath(this)" data-open="${b64([first])}">${ICON.finder}访问</button>`:`<span class="note">展开</span>`}</div><div class="dup-paths">${pathsHtml}</div></div>`}).join('');const total=items.reduce((a,it)=>a+parseGB(it.wasted),0);return pageShell('duplicates','重复文件',total>0?`可省 ${fmtGB(total)}`:'副本路径',`<div class="panel"><div class="panel-title"><h3>重复文件组</h3><span>${items.length}</span></div><div class="dup-list">${rows||'<div class="empty">暂无数据</div>'}</div></div>`)}
	function renderApplications(items){items=arr(items);const max=Math.max(...items.map(it=>parseGB(it.size)),0)||1;const rows=items.map(it=>{const gb=parseGB(it.size);const initial=(it.name||'A').replace(/^\W+/,'').charAt(0).toUpperCase()||'A';return `<div class="app-row"><div class="app-icon">${esc(initial)}</div><div class="item-main"><div class="item-name">${esc(it.name)}</div><div class="item-path">${esc(it.path)}</div></div><div class="bar-track"><i style="width:${pct(gb,max).toFixed(1)}%"></i></div><div class="item-size">${esc(cleanSize(it.size))}</div>${DELETE?`<button class="btn ghost" onclick="openPath(this)" data-open="${b64([it.path])}">${ICON.finder}访问</button>`:`<span class="note">只读</span>`}</div>`}).join('');return pageShell('applications','应用程序','应用排行',`<div class="panel"><div class="panel-title"><h3>应用体积</h3><span>${items.length}</span></div><div class="app-list">${rows||'<div class="empty">暂无数据</div>'}</div></div>`)}
function renderSummary(sm){if(!sm)return '';const cols=[];if(arr(sm.priority).length)cols.push(['清理优先级',sm.priority]);if(arr(sm.long_term).length)cols.push(['长期建议',sm.long_term]);if(!cols.length)return '';return `<div class="panel"><div class="panel-title"><h3>建议</h3><span>下一步</span></div><div class="summary">${cols.map(c=>`<div class="summary-block"><h3>${esc(c[0])}</h3><ul>${arr(c[1]).map(x=>`<li>${esc(x)}</li>`).join('')}</ul></div>`).join('')}</div></div>`}
	function renderDenied(){if(!arr(DATA.denied).length)return '';return `<div class="denied"><b>权限不足</b>${arr(DATA.denied).map(p=>`<code>${esc(p)}</code>`).join('')}</div>`}
	function trashBlock(it){if(!DELETE||!arr(it.trash_paths).length)return '';return `<button class="btn ghost" onclick="openPath(this)" data-open="${b64(it.trash_paths)}">${ICON.finder}访问</button><button class="btn primary" onclick="doTrash(this)" data-paths="${b64(it.trash_paths)}">${ICON.trash}移废纸篓</button><span class="status"></span>`}
	function yellowBlock(it){if(!DELETE)return '';const hasTrash=arr(it.trash_paths).length;return `<button class="btn ghost" onclick="openPath(this)" data-open="${b64([it.path])}">${ICON.finder}访问</button>${hasTrash?`<button class="btn" onclick="doTrash(this)" data-paths="${b64(it.trash_paths)}">${ICON.trash}移废纸篓</button>`:''}<span class="status"></span>`}
	function redBlock(it){if(!DELETE||!arr(it.app_paths).length)return '';return `<button class="btn ghost" onclick="openPath(this)" data-open="${b64(it.app_paths)}">${ICON.finder}访问</button><span class="status"></span>`}
function closestAction(btn){return btn.closest('.decision-row')||btn.closest('.dup-group')||btn.closest('.file-row')||btn.closest('.app-row')||btn.closest('.btn-row')||document.body}
function triggerSafeClean(){if(!DELETE){switchPage('analysis');switchDecision('green');return}switchPage('analysis');switchDecision('green');const status=document.getElementById('overviewStatus');const wraps=[...document.querySelectorAll('#page-analysis .decision-row.green')].filter(w=>!w.classList.contains('cleaned')&&w.querySelector('[data-paths]'));if(!wraps.length){if(status){status.textContent='没有可清理的项了';status.className='status'}return}const all=[];let gb=0;wraps.forEach(w=>{unb64(w.querySelector('[data-paths]').dataset.paths).forEach(p=>all.push(p));const sz=w.querySelector('.decision-size');if(sz)gb+=parseGB(sz.textContent)});if(!confirm(`确认将 ${wraps.length} 项可再生缓存全部移到废纸篓？\n共 ${all.length} 个路径${gb>0?'，约 '+gb.toFixed(1)+' GB':''}。`))return;postAction({querySelector:()=>document.getElementById('overviewStatus'),querySelectorAll:()=>[]},all,'trash').then(res=>{if(res.ok){if(status){status.textContent=`✓ 已移 ${wraps.length} 项`;status.className='status ok'}wraps.forEach(markCleaned);mergeLog(res.log)}else if(status){status.textContent='✗ '+(res.error||'失败');status.className='status err'}})}
function postAction(wrap,paths,mode){const status=wrap.querySelector?wrap.querySelector('.status'):null;const btns=wrap.querySelectorAll?wrap.querySelectorAll('.btn'):[];if(status){status.textContent='处理中...';status.className='status busy'}btns.forEach(b=>b.disabled=true);return fetch(DELETE.endpoint,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:DELETE.token,paths,mode})}).then(r=>r.json()).then(res=>{btns.forEach(b=>b.disabled=false);return res}).catch(e=>{btns.forEach(b=>b.disabled=false);return{ok:false,error:'连接失败：'+e}})}
function markCleaned(wrap){const item=wrap.closest?wrap.closest('.decision-row'):null;if(item)item.classList.add('cleaned');const st=wrap.querySelector?wrap.querySelector('.status'):null;if(st){st.textContent='✓ 已移到废纸篓';st.className='status ok'}if(wrap.querySelectorAll)wrap.querySelectorAll('.btn.primary,.btn:not(.ghost)').forEach(b=>{if(b.textContent.includes('废纸篓'))b.remove()})}
function doTrash(btn){const wrap=closestAction(btn);const paths=unb64(btn.dataset.paths);if(!confirm(`确认移到废纸篓（可恢复）以下 ${paths.length} 个路径？\n\n`+paths.join('\n')))return;postAction(wrap,paths,'trash').then(res=>{const st=wrap.querySelector('.status');if(res.ok){markCleaned(wrap);mergeLog(res.log)}else if(st){st.textContent='✗ '+(res.error||'失败');st.className='status err'}})}
function openPath(btn){const wrap=closestAction(btn);const paths=unb64(btn.dataset.open);postAction(wrap,paths,'open').then(res=>{const st=wrap.querySelector('.status');if(st){if(res.ok){st.textContent='✓ 已在'+FM+'打开';st.className='status ok'}else{st.textContent='✗ '+(res.error||'失败');st.className='status err'}}else if(!res.ok){alert(res.error||'打开失败')}})}
function mergeLog(log){if(!log||!log.actions)return;log.actions.forEach(a=>{if(a.mode==='trash'&&a.path)CLEANED_PATHS.add(a.path)});document.querySelectorAll('[data-paths]').forEach(b=>{const row=b.closest('.decision-row');if(!row)return;const paths=unb64(b.dataset.paths);if(paths.length&&paths.every(p=>CLEANED_PATHS.has(p)))markCleaned(row)})}
function switchPage(id){ACTIVE_PAGE=id;document.querySelectorAll('.page').forEach(p=>p.classList.toggle('active',p.dataset.page===id));document.querySelectorAll('.nav-link').forEach(b=>b.classList.toggle('active',b.dataset.page===id));updateTopActions(id);history.replaceState(null,'','#'+id)}
function switchDecision(id){ACTIVE_DECISION=id;document.querySelectorAll('.decision-tab').forEach(b=>b.classList.toggle('active',b.dataset.decision===id));document.querySelectorAll('.decision-page').forEach(p=>p.classList.toggle('active',p.dataset.decisionPage===id))}
function initNav(){document.querySelectorAll('.nav-link').forEach(b=>b.addEventListener('click',()=>switchPage(b.dataset.page)));const hash=(location.hash||'').replace('#','');if(['overview','analysis','big-files','duplicates','applications'].includes(hash))switchPage(hash);else switchPage('overview')}
document.getElementById('app').innerHTML=renderOverview(DATA.system||{},DATA.summary||{})+renderAnalysis()+renderBigFiles(DATA.big_files)+renderDuplicates(DATA.duplicates)+renderApplications(DATA.applications);
initNav();switchDecision('green');
if(DELETE&&DELETE.logEndpoint){fetch(DELETE.logEndpoint).then(r=>r.json()).then(mergeLog).catch(()=>{})}
</script>
</body>
